<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套餐支付 - 多多优化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .payment-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }
        
        .plan-info {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .plan-info h2 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 20px;
        }
        
        .plan-details {
            margin-bottom: 30px;
        }
        
        .plan-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e3e8ee;
        }
        
        .plan-item:last-child {
            border-bottom: none;
        }
        
        .plan-item .label {
            color: #666;
        }
        
        .plan-item .value {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .plan-item .price {
            font-size: 24px;
            color: #E84D1A;
        }
        
        .features {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        
        .features h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 15px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #666;
        }
        
        .feature-item::before {
            content: "✓";
            color: #10b981;
            font-weight: 700;
            margin-right: 10px;
        }
        
        .payment-methods {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .payment-methods h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 20px;
        }
        
        .method-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .method-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #e3e8ee;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .method-tab:hover {
            border-color: #E84D1A;
        }
        
        .method-tab.active {
            border-color: #E84D1A;
            background: #fff5f2;
        }
        
        .method-tab .icon {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .method-tab .name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .qrcode-container {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .qrcode {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            background: white;
            border: 1px solid #e3e8ee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }
        
        .qrcode img {
            width: 100%;
            height: 100%;
        }
        
        .qrcode-tip {
            color: #666;
            font-size: 14px;
        }
        
        .order-info {
            background: #fff5f2;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .order-info .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .order-info .item:last-child {
            margin-bottom: 0;
        }
        
        .order-info .label {
            color: #666;
        }
        
        .order-info .value {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .btn-confirm {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E84D1A 0%, #FF6B35 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 77, 26, 0.3);
        }
        
        .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        
        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #E84D1A;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .payment-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/static/app.html" class="back-link">← 返回</a>
        
        <div class="header">
            <h1>💎 套餐支付</h1>
            <p>选择支付方式完成购买</p>
        </div>
        
        <div class="payment-container">
            <!-- 左侧：套餐信息 -->
            <div class="plan-info">
                <h2 id="plan-name">基础版</h2>
                
                <div class="plan-details">
                    <div class="plan-item">
                        <span class="label">套餐类型</span>
                        <span class="value" id="plan-type">基础版</span>
                    </div>
                    <div class="plan-item">
                        <span class="label">购买时长</span>
                        <span class="value">1个月</span>
                    </div>
                    <div class="plan-item">
                        <span class="label">支付金额</span>
                        <span class="price">¥<span id="plan-price">49</span></span>
                    </div>
                </div>
                
                <div class="features">
                    <h3>套餐权益</h3>
                    <div id="features-list">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
            
            <!-- 右侧：支付方式 -->
            <div class="payment-methods">
                <h2>选择支付方式</h2>
                
                <div class="method-tabs">
                    <div class="method-tab active" onclick="selectMethod('wechat')">
                        <div class="icon">💚</div>
                        <div class="name">微信支付</div>
                    </div>
                    <div class="method-tab" onclick="selectMethod('alipay')">
                        <div class="icon">💙</div>
                        <div class="name">支付宝</div>
                    </div>
                </div>
                
                <div class="qrcode-container" id="qrcode-container">
                    <div class="qrcode" id="qrcode">
                        <span>点击"生成支付码"</span>
                    </div>
                    <div class="qrcode-tip">请使用<span id="method-name">微信</span>扫码支付</div>
                </div>
                
                <div class="order-info">
                    <div class="item">
                        <span class="label">订单号</span>
                        <span class="value" id="order-id">-</span>
                    </div>
                    <div class="item">
                        <span class="label">创建时间</span>
                        <span class="value" id="order-time">-</span>
                    </div>
                </div>
                
                <button class="btn-confirm" onclick="generatePayment()">生成支付码</button>
                
                <div id="status-message" class="status-message"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPlan = null;
        let currentMethod = 'wechat';
        let orderId = null;
        let checkInterval = null;
        
        // 套餐配置
        const plans = {
            '基础版': {
                price: 69,
                features: [
                    '每月 30 次 AI 分析',
                    '数据导入导出',
                    '诊断中心',
                    '增长机会',
                    'AI 建议',
                    '社区交流',
                    '邮件支持'
                ]
            },
            '专业版': {
                price: 129,
                features: [
                    '无限次 AI 分析',
                    '数据导入导出',
                    '诊断中心',
                    '增长机会',
                    'AI 建议',
                    '自动化执行',
                    '社区交流',
                    '优先客服支持',
                    'API 接口'
                ]
            }
        };
        
        // 初始化
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const planName = urlParams.get('plan') || '基础版';
            
            currentPlan = plans[planName];
            
            if (!currentPlan) {
                alert('套餐不存在');
                window.location.href = '/static/app.html';
                return;
            }
            
            // 显示套餐信息
            document.getElementById('plan-name').textContent = planName;
            document.getElementById('plan-type').textContent = planName;
            document.getElementById('plan-price').textContent = currentPlan.price;
            
            // 显示权益
            const featuresList = document.getElementById('features-list');
            featuresList.innerHTML = currentPlan.features.map(f => 
                `<div class="feature-item">${f}</div>`
            ).join('');
        }
        
        // 选择支付方式
        function selectMethod(method) {
            currentMethod = method;
            
            // 更新选中状态
            document.querySelectorAll('.method-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.closest('.method-tab').classList.add('active');
            
            // 更新提示文字
            const methodName = method === 'wechat' ? '微信' : '支付宝';
            document.getElementById('method-name').textContent = methodName;
            
            // 清空二维码
            document.getElementById('qrcode').innerHTML = '<span>点击"生成支付码"</span>';
            document.getElementById('order-id').textContent = '-';
            document.getElementById('order-time').textContent = '-';
        }
        
        // 生成支付码
        async function generatePayment() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '生成中...';
            
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const planName = urlParams.get('plan') || '基础版';
                
                const response = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        plan: planName,
                        method: currentMethod,
                        amount: currentPlan.price
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    orderId = result.order_id;
                    
                    // 显示订单信息
                    document.getElementById('order-id').textContent = result.order_id;
                    document.getElementById('order-time').textContent = result.created_at;
                    
                    // 显示二维码
                    const qrcodeDiv = document.getElementById('qrcode');
                    qrcodeDiv.innerHTML = `<img src="${result.qrcode_url}" alt="支付二维码">`;
                    
                    // 开始轮询支付状态
                    startCheckPayment();
                    
                    btn.textContent = '等待支付...';
                } else {
                    showMessage('生成失败：' + result.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '生成支付码';
                }
            } catch (error) {
                showMessage('生成失败：' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '生成支付码';
            }
        }
        
        // 开始检查支付状态
        function startCheckPayment() {
            if (checkInterval) {
                clearInterval(checkInterval);
            }
            
            checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/payment/status?order_id=${orderId}`);
                    const result = await response.json();
                    
                    if (result.status === 'paid') {
                        clearInterval(checkInterval);
                        showMessage('✅ 支付成功！正在跳转...', 'success');
                        
                        setTimeout(() => {
                            window.location.href = '/static/app.html?payment=success';
                        }, 2000);
                    }
                } catch (error) {
                    console.error('检查支付状态失败:', error);
                }
            }, 3000); // 每3秒检查一次
        }
        
        // 显示消息
        function showMessage(message, type) {
            const msgDiv = document.getElementById('status-message');
            msgDiv.textContent = message;
            msgDiv.className = 'status-message ' + type;
        }
        
        // 页面加载时初始化
        window.onload = init;
        
        // 页面关闭时停止轮询
        window.onbeforeunload = function() {
            if (checkInterval) {
                clearInterval(checkInterval);
            }
        };
    </script>
</body>
</html>
