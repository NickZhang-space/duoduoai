<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - PDD GrowthOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f8f9fa; 
        }
        
        /* 顶部导航 */
        .admin-header {
            background: linear-gradient(135deg, #E84D1A 0%, #FF6B35 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .admin-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .admin-header .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }
        
        /* 主容器 */
        .admin-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .trend {
            margin-top: 10px;
            font-size: 13px;
            color: #10b981;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e3e8ee;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab:hover {
            color: #E84D1A;
        }
        .tab.active {
            color: #E84D1A;
            border-bottom-color: #E84D1A;
        }
        
        /* 内容区域 */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        /* 用户表格 */
        .users-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .table-header {
            padding: 20px;
            border-bottom: 1px solid #e3e8ee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-header h2 {
            font-size: 18px;
            color: #1a1a2e;
        }
        .search-box {
            padding: 8px 16px;
            border: 2px solid #e3e8ee;
            border-radius: 8px;
            font-size: 14px;
            width: 300px;
        }
        .search-box:focus {
            outline: none;
            border-color: #E84D1A;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #e3e8ee;
            color: #333;
        }
        tr:hover {
            background: #f8f9fa;
        }
        
        /* 状态标签 */
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.active {
            background: #d1fae5;
            color: #065f46;
        }
        .status-badge.banned {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-badge.free {
            background: #e0e7ff;
            color: #3730a3;
        }
        .status-badge.basic {
            background: #dbeafe;
            color: #1e40af;
        }
        .status-badge.pro {
            background: #fef3c7;
            color: #92400e;
        }
        
        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #E84D1A;
            color: white;
        }
        .btn-primary:hover {
            background: #d43d0a;
        }
        .btn-secondary {
            background: #e3e8ee;
            color: #666;
        }
        .btn-secondary:hover {
            background: #d1d5db;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 操作按钮组 */
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
        }
        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #666;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e3e8ee;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #E84D1A;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        
        /* 日志表格 */
        .log-entry {
            padding: 15px;
            border-bottom: 1px solid #e3e8ee;
            display: grid;
            grid-template-columns: 150px 100px 1fr 150px;
            gap: 15px;
            align-items: center;
        }
        .log-time {
            color: #999;
            font-size: 13px;
        }
        .log-admin {
            font-weight: 600;
            color: #E84D1A;
        }
        .log-action {
            color: #333;
        }
        .log-target {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="admin-header">
        <h1>🛡️ 管理员后台</h1>
        <div class="subtitle">PDD GrowthOS 系统管理</div>
    </div>
    
    <!-- 主容器 -->
    <div class="admin-container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总用户数</div>
                <div class="value" id="total-users">0</div>
                <div class="trend">↑ 本周新增 12 人</div>
            </div>
            <div class="stat-card">
                <div class="label">付费用户</div>
                <div class="value" id="paid-users">0</div>
                <div class="trend">转化率 35%</div>
            </div>
            <div class="stat-card">
                <div class="label">今日活跃</div>
                <div class="value" id="active-users">0</div>
                <div class="trend">↑ 较昨日 +8%</div>
            </div>
            <div class="stat-card">
                <div class="label">本月收入</div>
                <div class="value">¥<span id="monthly-revenue">0</span></div>
                <div class="trend">↑ 较上月 +23%</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('users')">👥 用户管理</button>
            <button class="tab" onclick="switchTab('logs')">📋 操作日志</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ 系统设置</button>
        </div>
        
        <!-- 用户管理 -->
        <div id="users-tab" class="tab-content active">
            <div class="users-table">
                <div class="table-header">
                    <h2>用户列表</h2>
                    <input type="text" class="search-box" placeholder="搜索用户..." onkeyup="searchUsers(this.value)">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>用户ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>套餐</th>
                            <th>AI额度</th>
                            <th>状态</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 操作日志 -->
        <div id="logs-tab" class="tab-content">
            <div class="users-table">
                <div class="table-header">
                    <h2>操作日志</h2>
                </div>
                <div id="logs-list">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
        
        <!-- 系统设置 -->
        <div id="settings-tab" class="tab-content">
            <div class="users-table">
                <div class="table-header">
                    <h2>系统设置</h2>
                </div>
                <div style="padding: 30px;">
                    <div class="form-group">
                        <label>免费版 AI 额度（每月）</label>
                        <input type="number" id="free-quota" value="2">
                    </div>
                    <div class="form-group">
                        <label>基础版 AI 额度（每日）</label>
                        <input type="number" id="basic-quota" value="50">
                    </div>
                    <div class="form-group">
                        <label>专业版 AI 额度</label>
                        <input type="text" id="pro-quota" value="无限" readonly>
                    </div>
                    <button class="btn btn-primary" onclick="saveSystemSettings()">保存设置</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 调整额度模态框 -->
    <div id="quota-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">调整 AI 额度</div>
            <div class="form-group">
                <label>用户</label>
                <input type="text" id="modal-username" readonly>
            </div>
            <div class="form-group">
                <label>当前额度</label>
                <input type="number" id="modal-current-quota" readonly>
            </div>
            <div class="form-group">
                <label>新额度</label>
                <input type="number" id="modal-new-quota" placeholder="输入新的额度">
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="modal-reason" placeholder="调整原因（可选）">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('quota-modal')">取消</button>
                <button class="btn btn-primary" onclick="confirmQuotaChange()">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 封禁用户模态框 -->
    <div id="ban-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">封禁用户</div>
            <div class="form-group">
                <label>用户</label>
                <input type="text" id="ban-username" readonly>
            </div>
            <div class="form-group">
                <label>封禁原因</label>
                <input type="text" id="ban-reason" placeholder="请输入封禁原因">
            </div>
            <div class="form-group">
                <label>封禁时长</label>
                <select id="ban-duration">
                    <option value="7">7天</option>
                    <option value="30">30天</option>
                    <option value="365">1年</option>
                    <option value="-1">永久</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('ban-modal')">取消</button>
                <button class="btn btn-danger" onclick="confirmBan()">确认封禁</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentUserId = null;
        let users = [];
        
        // 加载用户列表
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const result = await response.json();
                
                if (result.success) {
                    users = result.data;
                    renderUsers(users);
                    updateStats(users);
                }
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }
        
        // 渲染用户列表
        function renderUsers(userList) {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = userList.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td><span class="status-badge ${user.plan}">${user.plan_name}</span></td>
                    <td>${user.ai_quota}</td>
                    <td><span class="status-badge ${user.status}">${user.status === 'active' ? '正常' : '已封禁'}</span></td>
                    <td>${user.created_at}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-primary btn-sm" onclick="openQuotaModal(${user.id})">调整额度</button>
                            ${user.status === 'active' 
                                ? `<button class="btn btn-danger btn-sm" onclick="openBanModal(${user.id})">封禁</button>`
                                : `<button class="btn btn-secondary btn-sm" onclick="unbanUser(${user.id})">解封</button>`
                            }
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // 更新统计
        function updateStats(userList) {
            document.getElementById('total-users').textContent = userList.length;
            document.getElementById('paid-users').textContent = userList.filter(u => u.plan !== 'free').length;
            document.getElementById('active-users').textContent = userList.filter(u => u.status === 'active').length;
            
            const revenue = userList.reduce((sum, u) => {
                if (u.plan === 'basic') return sum + 49;
                if (u.plan === 'pro') return sum + 129;
                return sum;
            }, 0);
            document.getElementById('monthly-revenue').textContent = revenue;
        }
        
        // 搜索用户
        function searchUsers(keyword) {
            if (!keyword) {
                renderUsers(users);
                return;
            }
            
            const filtered = users.filter(u => 
                u.username.includes(keyword) || 
                u.email.includes(keyword) ||
                u.id.toString().includes(keyword)
            );
            renderUsers(filtered);
        }
        
        // 打开调整额度模态框
        function openQuotaModal(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            
            currentUserId = userId;
            document.getElementById('modal-username').value = user.username;
            document.getElementById('modal-current-quota').value = user.ai_quota;
            document.getElementById('modal-new-quota').value = '';
            document.getElementById('modal-reason').value = '';
            document.getElementById('quota-modal').classList.add('active');
        }
        
        // 确认调整额度
        async function confirmQuotaChange() {
            const newQuota = document.getElementById('modal-new-quota').value;
            const reason = document.getElementById('modal-reason').value;
            
            if (!newQuota) {
                alert('请输入新的额度');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/adjust-quota', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUserId,
                        new_quota: parseInt(newQuota),
                        reason: reason
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 额度调整成功');
                    closeModal('quota-modal');
                    loadUsers();
                    loadLogs();
                } else {
                    alert('❌ 调整失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 调整失败：' + error.message);
            }
        }
        
        // 打开封禁模态框
        function openBanModal(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            
            currentUserId = userId;
            document.getElementById('ban-username').value = user.username;
            document.getElementById('ban-reason').value = '';
            document.getElementById('ban-modal').classList.add('active');
        }
        
        // 确认封禁
        async function confirmBan() {
            const reason = document.getElementById('ban-reason').value;
            const duration = document.getElementById('ban-duration').value;
            
            if (!reason) {
                alert('请输入封禁原因');
                return;
            }
            
            if (!confirm('确认封禁此用户？')) return;
            
            try {
                const response = await fetch('/api/admin/ban-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: currentUserId,
                        reason: reason,
                        duration: parseInt(duration)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 用户已封禁');
                    closeModal('ban-modal');
                    loadUsers();
                    loadLogs();
                } else {
                    alert('❌ 封禁失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 封禁失败：' + error.message);
            }
        }
        
        // 解封用户
        async function unbanUser(userId) {
            if (!confirm('确认解封此用户？')) return;
            
            try {
                const response = await fetch('/api/admin/unban-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 用户已解封');
                    loadUsers();
                    loadLogs();
                } else {
                    alert('❌ 解封失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 解封失败：' + error.message);
            }
        }
        
        // 加载操作日志
        async function loadLogs() {
            try {
                const response = await fetch('/api/admin/logs');
                const result = await response.json();
                
                if (result.success) {
                    renderLogs(result.data);
                }
            } catch (error) {
                console.error('加载日志失败:', error);
            }
        }
        
        // 渲染日志
        function renderLogs(logs) {
            const list = document.getElementById('logs-list');
            list.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <div class="log-time">${log.timestamp}</div>
                    <div class="log-admin">${log.admin}</div>
                    <div class="log-action">${log.action}</div>
                    <div class="log-target">${log.target}</div>
                </div>
            `).join('');
        }
        
        // 保存系统设置
        async function saveSystemSettings() {
            const freeQuota = document.getElementById('free-quota').value;
            const basicQuota = document.getElementById('basic-quota').value;
            
            try {
                const response = await fetch('/api/admin/system-settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        free_quota: parseInt(freeQuota),
                        basic_quota: parseInt(basicQuota)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 设置已保存');
                } else {
                    alert('❌ 保存失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 保存失败：' + error.message);
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'logs') {
                loadLogs();
            }
        }
        
        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // 页面加载时初始化
        window.onload = function() {
            loadUsers();
        };
    </script>
</body>
</html>
